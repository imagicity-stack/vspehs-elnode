<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>El-Node — Offline</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc; color: #0f172a; padding: 24px; text-align: center;
      }
      .card {
        max-width: 360px; background: #fff; border: 1px solid #e2e8f0; border-radius: 24px;
        padding: 40px 28px; box-shadow: 0 2px 12px -2px rgba(16,24,40,.08);
      }
      .badge {
        width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 18px;
        background: linear-gradient(135deg, #1d40f5, #1a298f); display: flex;
        align-items: center; justify-content: center;
      }
      .ring { width: 30px; height: 30px; border-radius: 50%; border: 7px solid #fff; position: relative; }
      .dot { position: absolute; top: -4px; right: -4px; width: 12px; height: 12px; border-radius: 50%; background: #f97316; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #64748b; font-size: 14px; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; cursor: pointer; font-weight: 600; font-size: 14px;
        background: #1d40f5; color: #fff; padding: 12px 20px; border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"><div class="ring"><span class="dot"></span></div></div>
      <h1>You're offline</h1>
      <p>El-Node can't reach the network right now. Pages you've already opened still work — check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
